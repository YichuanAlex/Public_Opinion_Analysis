            1. 数据填空：严格使用用户提供的数据填入模板，**绝对禁止**自己进行任何加减乘除计算。

            2. 情感总结：根据提供的情感分布数据，写一句精炼的整体情绪倾向结论。

            3. 话题提炼：从【评论抽样】中归纳出 3 个用户真实关心的核心讨论方向。每条用一句话描述，聚焦实质内容，禁止出现"用户表示""评论区"等废话套话。


            ━━━━━━━━━━ 输出模板（格式与 emoji 必须完全一致）━━━━━━━━━━

