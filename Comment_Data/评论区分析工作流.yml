          ,\"非常失望\",\"超级失望\",\"很失望\",\"太失望\",\n    \"离谱\",\"太离谱\",\"真离谱\",\"也太离谱\"\
          ,\"不像话\",\"说不过去\",\"没法忍\",\n    \"绕路\",\"乱收费\",\"多收\",\"乱扣\",\"扣费\",\"乱扣费\"\
          ,\"自动扣\",\"强制扣\",\n    \"等太久\",\"等好久\",\"等了很久\",\"迟到\",\"超时\",\"没来\",\"\
          放鸽子\",\"爽约\",\n    \"态度差\",\"态度恶劣\",\"服务差\",\"服务烂\",\"体验差\",\"体验烂\",\"体验极差\"\
          ,\n    \"不安全\",\"危险\",\"超速\",\"闯红灯\",\"违规\",\"事故\",\"出事\",\"吓到\",\"吓死\"\
          ,\n    \"脏\",\"臭\",\"异味\",\"破\",\"旧\",\"破旧\",\"破烂\",\"车况差\",\n    \"骗人\"\
          ,\"坑人\",\"黑店\",\"黑车\",\"无良\",\"恶意\",\"故意\"\n}\n\n# 网络情绪词（直接判定）\nDIRECT_POSITIVE\
          \ = {\n    \"哈哈\",\"哈哈哈\",\"哈哈哈哈\",\"hh\",\"hhh\",\"哈\",\"嘻嘻\",\"嘿嘿\",\"\
          嘎嘎\",\n    \"哦哦\",\"好哒\",\"好滴\",\"阔以\",\"可以的\",\"行的\",\"妥\",\"稳的\",\"没毛病\"\
          ,\n    \"冲\",\"冲冲\",\"冲啊\",\"来了\",\"安排\",\"已安排\",\"已到\",\"到了\",\"秒到\",\n\
          \    \"感谢司机\",\"感谢师傅\",\"师傅辛苦\",\"辛苦了\",\"感恩\",\"比心\",\"爱心\"\n}\n\nDIRECT_NEGATIVE\
          \ = {\n    \"服了\",\"无了\",\"裂开\",\"蚌埠住了\",\"我的天\",\"我去\",\"救命\",\"算了\",\n\
          \    \"不想说了\",\"懒得说\",\"说多了都是泪\",\"心态崩了\",\"破防了\",\"自闭了\",\n    \"黑名单\"\
          ,\"永不再用\",\"再也不用\",\"最后一次\",\"第一次也是最后一次\"\n}\nNEGATION_WORDS = {\"不\",\"\
          没\",\"无\",\"非\",\"别\",\"未\",\"莫\",\"勿\",\"毫不\",\"并不\",\"从不\",\"绝不\"}\nDEGREE_HIGH\
          \ = {\"非常\",\"超级\",\"极其\",\"特别\",\"十分\",\"相当\",\"真的\",\"确实\",\"太\",\"很\"\
          ,\"超\",\"贼\",\"巨\"}\nDEGREE_LOW  = {\"有点\",\"有些\",\"稍微\",\"略微\",\"一点\",\"\
          还算\",\"还好\",\"勉强\",\"将就\"}\ndef analyze_sentiment(text):\n    text_clean\
          \ = re.sub(r'\\[[\\u4e00-\\u9fa5a-zA-Z0-9_]+\\]', '', text).strip()\n  \
          \  \n    # 直接判定词（优先检查）\n    for w in DIRECT_POSITIVE:\n        if w in text_clean:\n\
          \            return \"positive\"\n    for w in DIRECT_NEGATIVE:\n      \
          \  if w in text_clean:\n            return \"negative\"\n\n    pos_score\
          \ = 0.0\n    neg_score = 0.0\n    chars = list(text_clean)\n    length =\
          \ len(chars)\n\n    for i in range(length):\n        for wlen in range(2,\
          \ 8):\n            if i + wlen > length:\n                break\n      \
          \      word = \"\".join(chars[i:i+wlen])\n            if word not in POSITIVE_WORDS\
          \ and word not in NEGATIVE_WORDS:\n                continue\n\n        \
          \    context = \"\".join(chars[max(0, i-5):i])\n            negated = any(neg\
          \ in context for neg in NEGATION_WORDS)\n            weight = 1.5 if any(d\
          \ in context for d in DEGREE_HIGH) else (0.6 if any(d in context for d in\
          \ DEGREE_LOW) else 1.0)\n\n            if word in POSITIVE_WORDS:\n    \
          \            if negated:\n                    neg_score += weight\n    \
          \            else:\n                    pos_score += weight\n          \
          \  else:\n                if negated:\n                    pos_score +=\
          \ weight * 0.5\n                else:\n                    neg_score +=\
          \ weight\n\n    # 没有匹配到任何词：短评论倾向正面，长评论保持中性\n    if pos_score == 0 and neg_score\
          \ == 0:\n        return \"positive\" if len(text_clean) <= 10 else \"neutral\"\
          \n\n    ratio = pos_score / (pos_score + neg_score)\n    if ratio >= 0.55:\n\
          \        return \"positive\"\n    elif ratio <= 0.4:\n        return \"\
          negative\"\n    else:\n        return \"neutral\"\n\n\ndef main(records=\"\
          []\", target_keyword=\"\"):\n    raw_keyword = target_keyword.strip()\n\
          \    if not raw_keyword:\n        raw_keyword = \"未指定关键词\"\n# 支持多关键词，用逗号或空格分隔，单个关键词也正常工作\n\
          \    keywords = [kw.strip() for kw in re.split(r'[,，\\s]+', raw_keyword)\
          \ if kw.strip()]\n    if not keywords:\n        keywords = [raw_keyword]\n\
          \    # 上游传来的是 text 字段，是 JSON 字符串，需要解析\n    if isinstance(records, str):\n\
          \        try:\n            records = json.loads(records)\n        except\
          \ Exception:\n            records = []\n\n    # 解析后可能是 dict 包着的\n    if\
          \ isinstance(records, dict):\n        records = records.get(\"data\", records.get(\"\
          items\", []))\n\n    if not isinstance(records, list):\n        records\
          \ = []\n\n    comments_data = []\n    for record in records:\n        comment\
          \ = \"\"\n        likes = 0\n        if isinstance(record, dict):\n    \
          \        comment = str(record.get(\"评论内容\") or record.get(\"一级评论内容\") or\
          \ \"\")\n            if not comment or comment.lower() in (\"none\", \"\
          nan\", \"\"):\n                for key, val in record.items():\n       \
          \             key_str = str(key)\n                    if \"评论\" in key_str\
          \ and \"ID\" not in key_str and \"数\" not in key_str:\n                \
          \        comment = str(val)\n                        break\n           \
          \ try:\n                likes = int(float(str(record.get(\"点赞量\", 0) or\
          \ 0)))\n            except Exception:\n                likes = 0\n     \
          \   else:\n            comment = str(record)\n\n        comment = comment.strip()\n\
          \        if comment and comment.lower() not in (\"none\", \"nan\", \"\"\
          ):\n            comments_data.append({\"text\": comment, \"likes\": likes})\n\
          \n    total_count = len(comments_data)\n    if total_count == 0:\n     \
          \   return {\"error\": \"未读取到有效评论，请检查列名\"}\n\n    comments_list = [d[\"\
          text\"] for d in comments_data]\n\n    # 2. 多关键词统计\n    keyword_counts =\
          \ {kw: 0 for kw in keywords}\n    any_keyword_hit = 0\n\n    for text in\
          \ comments_list:\n        text_lower = text.lower()\n        matched_any\
          \ = False\n        for kw in keywords:\n            if kw.lower() in text_lower:\n\
          \                keyword_counts[kw] += 1\n                matched_any =\
          \ True\n        if matched_any:\n            any_keyword_hit += 1\n    \
          \        \n    keyword_ratio = f\"{any_keyword_hit / total_count * 100:.2f}%\"\
          \n    # 2. 多关键词统计 (补充明细占比)\n    details_list = []\n    for kw, cnt in keyword_counts.items():\n\
          \        kw_ratio = (cnt / total_count * 100) if total_count > 0 else 0\n\
          \        details_list.append(f\"'{kw}' ({cnt}条，占比 {kw_ratio:.1f}%)\")\n\
          \    keyword_details = \" ｜ \".join(details_list)\n\n    # 3. 情感分析\n   \
          \ pos_count = neg_count = neu_count = 0\n    for d in comments_data:\n \
          \       r = analyze_sentiment(d[\"text\"])\n        if r == \"positive\"\
          :\n            pos_count += 1\n        elif r == \"negative\":\n       \
          \     neg_count += 1\n        else:\n            neu_count += 1\n\n    pos_ratio\
          \ = f\"{pos_count / total_count * 100:.1f}%\"\n    neg_ratio = f\"{neg_count\
          \ / total_count * 100:.1f}%\"\n    neu_ratio = f\"{neu_count / total_count\
          \ * 100:.1f}%\"\n    sentiment_summary = f\"正面 {pos_count} 条（{pos_ratio}）｜负面\
          \ {neg_count} 条（{neg_ratio}）｜中性 {neu_count} 条（{neu_ratio}）\"\n\n    # 4.\
          \ 加权抽样\n    high = [d[\"text\"] for d in comments_data if d[\"likes\"] >=\
          \ 100]\n    normal = [d[\"text\"] for d in comments_data if d[\"likes\"\
          ] < 100]\n    selected = high[:100] + random.sample(normal, min(250 - min(len(high),\
          \ 100), len(normal)))\n    sampled_comments = \"\\n\".join(selected)\n\n\
          \    # 5. 提取 Top 10 高频词 (终极净化版)\n    stop_words_strong = {\n        \"我们\"\
          , \"你们\", \"他们\", \"感觉\", \"觉得\", \"时候\", \"应该\", \"然后\", \n        \"因为\"\
          , \"所以\", \"但是\", \"如果\", \"还是\", \"已经\", \"现在\", \"就是\",\n        \"好的\"\
          , \"好像\", \"看到\", \"这里\", \"那里\", \"其实\", \"知道\",\n        \"可以\", \"大家\"\
          , \"滴滴\", \"自己\", \"真的\", \"这个\", \"那个\", \"什么\",\n        \"怎么\", \"这么\"\
          , \"那么\", \"有点\", \"一下\", \"一直\", \"一次\", \"出来\",\n        \"不会\", \"不能\"\
          , \"不要\", \"不是\"\n    }\n    \n    # 强力单字停用字符：只要 N-gram 抓出来的词里包含这里面的任意一个字，直接作废\n\
          \    # 新增了对语气词（哈、呵、呜等）的无差别击杀\n    bad_chars = set(\"的了是就有在你也我他她它与及和着这那啊太很没去哈呵嘻哎呀哇哦嗯呜唉呢呗吧吗喔\"\
          )\n    \n    # 【关键修复 1】：在提取中文之前，先把所有的 [表情包文本] 直接物理抹除\n    text_no_emojis\
          \ = re.sub(r'\\[.*?\\]', '', \"\".join(comments_list))\n    \n    # 【关键修复\
          \ 2】：剔除掉纯英文（防止部分乱码），只保留纯汉字进行分析\n    all_text_clean = re.sub(r'[^\\u4e00-\\\
          u9fa5]', '', text_no_emojis)\n    \n    length = len(all_text_clean)\n \
          \   raw_counts = {}\n    \n    # 抓取 2字、3字、4字词\n    for n in [2, 3, 4]:\n\
          \        for i in range(length - n + 1):\n            w = all_text_clean[i:i+n]\n\
          \            # 过滤包含停用词或坏字的词块\n            if w in stop_words_strong or any(bc\
          \ in w for bc in bad_chars):\n                continue\n            raw_counts[w]\
          \ = raw_counts.get(w, 0) + 1\n\n    valid_counts = {w: c for w, c in raw_counts.items()\
          \ if c >= 3}\n\n    # 子串消除 (Subsumption) 算法，去重叠词\n    words = sorted(valid_counts.keys(),\
          \ key=len, reverse=True)\n    for i, longer in enumerate(words):\n     \
          \   if valid_counts[longer] <= 0:\n            continue\n        for shorter\
          \ in words[i+1:]:\n            if valid_counts[shorter] > 0 and shorter\
          \ in longer:\n                valid_counts[shorter] -= valid_counts[longer]\n\
          \n    # ====== 用以下代码替换掉原来最后的那段排序逻辑 ======\n    \n    # 1. 先计算所有候选词的“真正提及占比”\n\
          \    word_ratios = []\n    for word, freq in valid_counts.items():\n   \
          \     if freq <= 2: \n            continue\n            \n        # 精确计算提及率：有多少条评论真正包含了这个词\n\
          \        mention_count = sum(1 for c in comments_list if word in c)\n  \
          \      ratio = (mention_count / total_count) * 100\n        \n        #\
          \ 只保留占比大于 0.5% 的有效词\n        if ratio >= 0.5:\n            word_ratios.append((word,\
          \ ratio))\n\n    # 2. 关键修复：严格按照“占比 (ratio)”从大到小进行排序！\n    sorted_ratios\
          \ = sorted(word_ratios, key=lambda x: x[1], reverse=True)\n    \n     #\
          \ 3. 取前 10 名并格式化输出\n    top_keywords_list = []\n    for count, (word, ratio)\
          \ in enumerate(sorted_ratios[:10]):\n        top_keywords_list.append(f\"\
          {count+1}. {word} (占比 {ratio:.1f}%)\")\n\n    top_keywords_str = \"\\n\"\
          .join(top_keywords_list) if top_keywords_list else \"无有效高频词\"\n\n    # ==================\
          \ \U0001F447 就是漏了下面这一段 \U0001F447 ==================\n    compiled_data\
          \ = f\"\"\"\n- 目标检索词：{raw_keyword}\n- 总评论基数：{total_count} 条\n- 命中关键词的评论：{any_keyword_hit}\
          \ 条（占比 {keyword_ratio}）\n- 关键词明细：{keyword_details}\n- 整体情感分布：{sentiment_summary}\n\
          \n【高频词 Top 10】\n{top_keywords_str}\n\n【评论抽样】\n{sampled_comments}\n    \"\
          \"\"\n    # ================== \U0001F446 就是漏了上面这一段 \U0001F446 ==================\n\
          \n    # 返回时，除了原有的变量，额外增加这个打包好的 compiled_data\n    return {\n        \"total_count\"\
          :       total_count,\n        \"keyword_count\":     any_keyword_hit, \n\
          \        \"keyword_ratio\":     keyword_ratio,\n        \"target_keyword\"\
          :    raw_keyword,\n        \"keyword_details\":   keyword_details,\n   \
          \     \"pos_count\":         pos_count,\n        \"neg_count\":        \
          \ neg_count,\n        \"neu_count\":         neu_count,\n        \"pos_ratio\"\
          :         pos_ratio,\n        \"neg_ratio\":         neg_ratio,\n      \
          \  \"neu_ratio\":         neu_ratio,\n        \"sentiment_summary\": sentiment_summary,\n\
          \        \"sampled_comments\":  sampled_comments,\n        \"top_keywords_str\"\
          :  top_keywords_str,\n        \"compiled_data\":     compiled_data  # 现在这里就不会报错了\n\
          \    }"
        code_language: python3
        outputs:
          compiled_data:
