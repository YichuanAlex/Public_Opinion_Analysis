          \   \"感动\",\"暖\",\"温暖\",\"贴心\",\"走心\",\"用心\",\"舒心\",\"放心\",\"开心\",\"欢喜\"\
          ,\n    \"划算\",\"合适\",\"满足\",\"惊喜\",\"期待\",\"支持\",\"鼓励\",\"认可\",\"信任\",\"\
