          }\n\nNEGATIVE_WORDS = {\n    # 基础负面\n    \"差\",\"烂\",\"坏\",\"慢\",\"贵\",\"\
          坑\",\"骗\",\"假\",\"臭\",\"糟\",\"垃圾\",\"烦\",\"气\",\n    # 常用负面词\n    \"难用\"\
